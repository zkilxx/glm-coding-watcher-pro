<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GLM Coding 监测助手</title><link rel="stylesheet" href="popup.css"></head><body><main>
<header><span class="mark">G</span><div><h1>GLM Coding 监测助手</h1><p>事件驱动 · 单次点击 · 后续手动</p></div></header>
<section class="status"><span id="dot"></span><div><small>当前状态</small><strong id="status">正在读取…</strong></div></section>
<section class="presets"><button data-mode="stable">稳健</button><button data-mode="balanced">平衡</button><button data-mode="sprint">冲刺</button><button data-mode="custom">自定义</button></section>
<section class="plans"><div><b>目标套餐</b> <button id="discover">刷新套餐列表</button></div><div id="planList">尚未读取页面套餐</div><div><b>抢购优先级</b>（从上到下）</div><div id="priority"></div><p id="planWarning">请至少勾选一个目标套餐，否则无法开始监测。</p></section>
<section class="settings"><label>DOM 检测（毫秒）<input id="scanMs" type="number" min="100" step="50"></label><label class="toggle"><input id="autoRefresh" type="checkbox"><span>自动刷新页面</span></label><label>刷新间隔（秒）<input id="refresh" type="number" min="1" step="0.1"></label><label class="toggle"><input id="sound" type="checkbox"><span>声音提醒</span></label><label class="toggle"><input id="notifications" type="checkbox"><span>桌面通知</span></label></section>
<div class="actions"><button id="start">开始监测</button><button id="stop" class="secondary">停止</button></div>
<section class="stats"><span>检测 <b id="checks">0</b> 次</span><span>下次 <b id="next">—</b></span><span>原因 <b id="reason">—</b></span></section>
<details><summary>运行日志</summary><div id="logs"></div></details>
<p class="warning">冲刺：100ms 检测、最快 1 秒刷新，最多 5 分钟。高频刷新可能触发限流或风控；保持标签页可见更可靠。点击后立即停止刷新。</p>
<p class="notice">不会绕过验证码、登录、限流、风控或支付确认。</p>
</main><script src="popup.js"></script></body></html>

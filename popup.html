<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GLM Coding 监测助手</title><link rel="stylesheet" href="popup.css"></head><body><main>
<header><div><h1>GLM Coding 监测助手</h1><p>订阅可用性监测与优先级队列</p></div><span class="version">PRO</span></header>
<section class="statusbar"><span id="dot"></span><strong id="status">正在读取…</strong><small id="runtime">仅在本机运行</small></section>
<section><div class="section-title"><b>监测模式</b></div><div class="segments"><button data-mode="stable">稳健</button><button data-mode="balanced">平衡</button><button data-mode="sprint">冲刺</button><button data-mode="custom">自定义</button></div></section>
<section><div class="section-title"><b>订阅方案</b><button class="link-btn" id="discover">刷新全部套餐</button></div><div class="periods"><button class="active" data-period="all">全部</button><button data-period="monthly">月付</button><button data-period="quarterly">季付</button><button data-period="annual">年付</button></div><p id="scanProgress" class="muted">自动读取月付、季付、年付并恢复页面原状态</p><div class="plan-head"><span></span><span>方案</span><span>周期</span><span>价格</span><span>状态</span></div><div id="planList" class="plan-list"><div class="empty">尚未读取页面套餐</div></div><p id="scanErrors" class="error" hidden></p></section>
<section><div class="section-title"><b>抢购优先级</b><small>从上到下依次尝试</small></div><div id="priority" class="priority-list"></div><p id="planWarning" class="error">请至少选择一个目标套餐。</p></section>
<section><div class="section-title"><b>监测设置</b></div><div class="settings"><label>DOM 检测<input id="scanMs" type="number" min="100" step="50"><em>毫秒</em></label><label>页面刷新间隔<input id="refresh" type="number" min="1" step="0.1"><em>秒</em></label><label class="switch-row"><span>声音提醒</span><input id="sound" type="checkbox"></label><label class="switch-row"><span>桌面通知</span><input id="notifications" type="checkbox"></label></div></section>
<div class="actions"><button id="start">▶ 开始监测</button><button id="stop">■ 停止</button></div>
<section class="activity"><div><small>检测次数</small><b id="checks">0</b></div><div><small>下次刷新</small><b id="next">—</b></div><div><small>当前原因</small><b id="reason">—</b></div></section>
<details><summary>运行日志</summary><div id="logs"></div></details><p class="notice">本工具仅监测订阅按钮的可用性；验证码、订单确认与支付必须手动完成。</p>
</main><script src="popup.js"></script></body></html>
